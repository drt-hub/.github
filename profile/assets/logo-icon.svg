<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="drt icon">
  <title>drt</title>

  <!-- Purple rounded square -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="#7C3AED"/>

  <!-- Source bar (warehouse) -->
  <line x1="47" y1="23" x2="47" y2="41" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Arrow shaft -->
  <line x1="17" y1="32" x2="47" y2="32" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Arrowhead pointing left -->
  <polyline points="27,22 17,32 27,42" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
